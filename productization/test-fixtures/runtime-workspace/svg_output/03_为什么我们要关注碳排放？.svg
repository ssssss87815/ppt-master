<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><defs><linearGradient id="softGlow" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A5C3A" stop-opacity="0.12"/><stop offset="100%" stop-color="#27AE60" stop-opacity="0.02"/></linearGradient></defs><rect width="1280" height="720" fill="#FFFFFF"/><circle cx="1120" cy="98" r="160" fill="url(#softGlow)"/><circle cx="1184" cy="76" r="64" fill="#27AE60" opacity="0.09"/><rect x="64" y="44" width="1152" height="632" rx="24" fill="none" stroke="#D6E6D8" stroke-width="1.5"/><rect x="64" y="44" width="8" height="72" rx="4" fill="#27AE60"/><text x="96" y="88" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="36" font-weight="800" fill="#1A5C3A">为什么我们要关注碳排放？</text><text x="96" y="118" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="15" font-weight="500" fill="#7A8B80">三类典型环境影响</text><g opacity="0.9"><path d="M166 164 C156 130 178 96 210 86 C202 116 212 142 236 162" fill="none" stroke="#D6E6D8" stroke-width="4" stroke-linecap="round"/><path d="M544 164 C534 130 556 96 588 86 C580 116 590 142 614 162" fill="none" stroke="#D6E6D8" stroke-width="4" stroke-linecap="round"/><path d="M924 164 C914 130 936 96 968 86 C960 116 970 142 994 162" fill="none" stroke="#D6E6D8" stroke-width="4" stroke-linecap="round"/></g><rect x="88" y="172" width="340" height="430" rx="20" fill="#FFFFFF" stroke="#D6E6D8"/><circle cx="146" cy="234" r="26" fill="#F0F7F0"/><text x="146" y="243" text-anchor="middle" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="26">🌡️</text><text x="186" y="242" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="28" font-weight="800" fill="#1A5C3A">全球变暖</text><text x="122" y="304" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="21" font-weight="430" fill="#1A1A1A"><tspan x="122" dy="0">过去百年地球平均气温上升</tspan><tspan x="122" dy="33.6">约1.1°C，极端天气事</tspan><tspan x="122" dy="33.6">件频发。</tspan></text><rect x="122" y="422" width="272" height="112" rx="18" fill="#F4FAF7" stroke="#D6E6D8"/><text x="148" y="462" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="18" font-weight="600" fill="#4F6356">典型结果</text><text x="148" y="506" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="38" font-weight="800" fill="#27AE60">+1.1°C</text><text x="148" y="530" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="500" fill="#4F6356">持续升温会放大热浪、暴雨、干旱等极端事件。</text><rect x="470" y="172" width="340" height="430" rx="20" fill="#FFFFFF" stroke="#D6E6D8"/><circle cx="528" cy="234" r="26" fill="#F0F7F0"/><text x="528" y="243" text-anchor="middle" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="26">🧊</text><text x="568" y="242" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="28" font-weight="800" fill="#1A5C3A">冰川融化</text><text x="504" y="304" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="21" font-weight="430" fill="#1A1A1A"><tspan x="504" dy="0">北极海冰面积每十年缩减</tspan><tspan x="504" dy="33.6">约13%，海平面持续上升威</tspan><tspan x="504" dy="33.6">胁沿海城市。</tspan></text><rect x="504" y="422" width="272" height="112" rx="18" fill="#EFF7FB" stroke="#D6E6D8"/><text x="530" y="462" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="18" font-weight="600" fill="#4F6356">典型结果</text><text x="530" y="506" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="38" font-weight="800" fill="#1A5C3A">-13%</text><text x="530" y="530" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="500" fill="#4F6356">冰川加速消退，海岸与生态系统面临更高风险。</text><rect x="852" y="172" width="340" height="430" rx="20" fill="#FFFFFF" stroke="#D6E6D8"/><circle cx="910" cy="234" r="26" fill="#F0F7F0"/><text x="910" y="243" text-anchor="middle" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="26">🌊</text><text x="950" y="242" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="28" font-weight="800" fill="#1A5C3A">海洋酸化</text><text x="886" y="304" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="21" font-weight="430" fill="#1A1A1A"><tspan x="886" dy="0">海水吸收过量CO₂导致酸</tspan><tspan x="886" dy="33.6">化，珊瑚礁和白化现象日益</tspan><tspan x="886" dy="33.6">严重。</tspan></text><rect x="886" y="422" width="272" height="112" rx="18" fill="#FFF8ED" stroke="#D6E6D8"/><text x="912" y="462" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="18" font-weight="600" fill="#4F6356">典型结果</text><text x="912" y="506" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="36" font-weight="800" fill="#D97A1D">生态承压</text><text x="912" y="530" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="500" fill="#4F6356">酸化会削弱海洋生物的生存条件与生物多样性。</text></svg>