<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><defs><linearGradient id="softGlow" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A5C3A" stop-opacity="0.12"/><stop offset="100%" stop-color="#27AE60" stop-opacity="0.02"/></linearGradient></defs><rect width="1280" height="720" fill="#FFFFFF"/><circle cx="1120" cy="98" r="160" fill="url(#softGlow)"/><circle cx="1184" cy="76" r="64" fill="#27AE60" opacity="0.09"/><rect x="64" y="44" width="1152" height="632" rx="24" fill="none" stroke="#D6E6D8" stroke-width="1.5"/><rect x="64" y="44" width="8" height="72" rx="4" fill="#27AE60"/><text x="96" y="88" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="36" font-weight="800" fill="#1A5C3A">什么是低碳生活？</text><text x="96" y="118" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="15" font-weight="500" fill="#7A8B80">定义与关键数字</text><rect x="88" y="152" width="562" height="498" rx="20" fill="#F0F7F0" stroke="#D6E6D8"/><rect x="112" y="176" width="122" height="36" rx="18" fill="#FFFFFF"/><text x="138" y="200" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="19" font-weight="700" fill="#1A5C3A">🌍 定义</text><text x="112" y="252" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="22" font-weight="450" fill="#1A1A1A"><tspan x="112" dy="0">低碳生活是指减少二氧化碳等温室气</tspan><tspan x="112" dy="35.2">体排放的生活方式。</tspan></text><text x="112" y="348" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="22" font-weight="450" fill="#1A1A1A"><tspan x="112" dy="0">通过改变日常行为习惯——节约能源</tspan><tspan x="112" dy="35.2">、绿色出行、减少浪费——来降低碳</tspan><tspan x="112" dy="35.2">足迹。</tspan></text><text x="112" y="468" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="22" font-weight="450" fill="#1A1A1A"><tspan x="112" dy="0">核心目标：实现人与自然和谐共生，</tspan><tspan x="112" dy="35.2">应对全球气候变化。</tspan></text><rect x="706" y="166" width="486" height="208" rx="22" fill="#FFFFFF" stroke="#D6E6D8" stroke-width="1.5"/><circle cx="770" cy="226" r="28" fill="#F0F7F0"/><use data-icon="tabler-outline/building-factory" x="752" y="208" width="36" height="36" fill="#27AE60" stroke-width="2"/><text x="822" y="246" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="52" font-weight="800" fill="#27AE60">532亿吨</text><text x="822" y="292" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="24" font-weight="700" fill="#1A5C3A">全球年碳排放总量</text><rect x="706" y="420" width="486" height="208" rx="22" fill="#FFFFFF" stroke="#D6E6D8" stroke-width="1.5"/><circle cx="770" cy="480" r="28" fill="#F0F7F0"/><use data-icon="tabler-outline/sun" x="752" y="462" width="36" height="36" fill="#27AE60" stroke-width="2"/><text x="822" y="500" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="52" font-weight="800" fill="#27AE60">2030年前</text><text x="822" y="546" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="24" font-weight="700" fill="#1A5C3A">碳达峰目标</text></svg>