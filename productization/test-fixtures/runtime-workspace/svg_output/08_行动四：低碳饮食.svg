<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><defs><linearGradient id="softGlow" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A5C3A" stop-opacity="0.12"/><stop offset="100%" stop-color="#27AE60" stop-opacity="0.02"/></linearGradient></defs><rect width="1280" height="720" fill="#FFFFFF"/><circle cx="1120" cy="98" r="160" fill="url(#softGlow)"/><circle cx="1184" cy="76" r="64" fill="#27AE60" opacity="0.09"/><rect x="64" y="44" width="1152" height="632" rx="24" fill="none" stroke="#D6E6D8" stroke-width="1.5"/><rect x="64" y="44" width="8" height="72" rx="4" fill="#27AE60"/><text x="96" y="88" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="36" font-weight="800" fill="#1A5C3A">行动四：低碳饮食</text><text x="96" y="118" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="15" font-weight="500" fill="#7A8B80">左侧饮食建议 · 右侧食物碳排对比</text><rect x="88" y="160" width="470" height="470" rx="20" fill="#F0F7F0" stroke="#D6E6D8"/><text x="116" y="208" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="24" font-weight="800" fill="#1A5C3A">💡 饮食建议</text><circle cx="126" cy="238" r="4" fill="#27AE60"/><text x="144" y="248" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="20" font-weight="450" fill="#1A1A1A"><tspan x="144" dy="0">减少红肉摄入，多吃禽类和植物蛋</tspan><tspan x="144" dy="30.0">白</tspan></text><circle cx="126" cy="306" r="4" fill="#27AE60"/><text x="144" y="316" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="20" font-weight="450" fill="#1A1A1A"><tspan x="144" dy="0">选择本地当季食材，减少运输碳排</tspan><tspan x="144" dy="30.0">放</tspan></text><circle cx="126" cy="374" r="4" fill="#27AE60"/><text x="144" y="384" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="20" font-weight="450" fill="#1A1A1A"><tspan x="144" dy="0">适量购买，减少食物浪费</tspan></text><circle cx="126" cy="442" r="4" fill="#27AE60"/><text x="144" y="452" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="20" font-weight="450" fill="#1A1A1A"><tspan x="144" dy="0">自带餐具，减少一次性用品</tspan></text><circle cx="126" cy="510" r="4" fill="#27AE60"/><text x="144" y="520" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="20" font-weight="450" fill="#1A1A1A"><tspan x="144" dy="0">尝试每周一天素食日</tspan></text><line x1="700" y1="200" x2="700" y2="580" stroke="#D6E6D8" stroke-width="2"/><line x1="700" y1="580" x2="1180" y2="580" stroke="#D6E6D8" stroke-width="2"/><text x="690" y="240" text-anchor="end" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" fill="#4F6356">🥩 牛肉</text><rect x="700" y="220" width="410" height="28" rx="14" fill="#C45734" opacity="0.92"/><text x="1120" y="240" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="700" fill="#1A5C3A">27 kg CO₂/kg</text><text x="690" y="300" text-anchor="end" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" fill="#4F6356">🧀 奶酪</text><rect x="700" y="280" width="197" height="28" rx="14" fill="#F39C20" opacity="0.92"/><text x="907" y="300" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="700" fill="#1A5C3A">13 kg CO₂/kg</text><text x="690" y="360" text-anchor="end" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" fill="#4F6356">🍗 鸡肉</text><rect x="700" y="340" width="91" height="28" rx="14" fill="#27AE60" opacity="0.92"/><text x="801" y="360" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="700" fill="#1A5C3A">6 kg CO₂/kg</text><text x="690" y="420" text-anchor="end" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" fill="#4F6356">🐟 鱼类</text><rect x="700" y="400" width="83" height="28" rx="14" fill="#27AE60" opacity="0.92"/><text x="793" y="420" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="700" fill="#1A5C3A">5.5 kg CO₂/kg</text><text x="690" y="480" text-anchor="end" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" fill="#4F6356">🥬 蔬菜</text><rect x="700" y="460" width="30" height="28" rx="14" fill="#27AE60" opacity="0.92"/><text x="740" y="480" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="17" font-weight="700" fill="#1A5C3A">2 kg CO₂/kg</text></svg>