<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><defs><linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F3FAF5"/></linearGradient><linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#27AE60"/><stop offset="100%" stop-color="#1A5C3A"/></linearGradient></defs><rect width="1280" height="720" fill="url(#heroBg)"/><circle cx="1030" cy="112" r="188" fill="#F0F7F0"/><path d="M924 188 C1012 38 1188 52 1172 220 C1076 184 1004 184 924 188Z" fill="url(#leafGrad)" opacity="0.18"/><rect x="96" y="92" width="1088" height="544" rx="34" fill="#FFFFFF" stroke="#DDEBE0" stroke-width="1.5"/><use data-icon="tabler-outline/leaf" x="146" y="138" width="54" height="54" fill="#27AE60" stroke-width="2"/><text x="216" y="174" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="52" font-weight="800" fill="#1A5C3A"><tspan x="216" dy="0">结语：从今天开始，</tspan><tspan x="216" dy="58">做低碳生活践行者</tspan></text><rect x="216" y="262" width="656" height="110" rx="24" fill="#F4FAF7" stroke="#D6E6D8"/><text x="248" y="312" text-anchor="start" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="28" font-weight="700" fill="#1A1A1A">“一个人的力量也许微小，但千万人的改变，足以影响世界。”</text><rect x="216" y="408" width="414" height="140" rx="24" fill="#FFFFFF" stroke="#D6E6D8"/><text x="248" y="450" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="18" font-weight="600" fill="#4F6356">为什么值得开始</text><text x="248" y="488" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="24" font-weight="800" fill="#1A5C3A">低碳不是牺牲生活品质，</text><text x="248" y="522" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="24" font-weight="800" fill="#1A5C3A">而是更健康、更节约、</text><text x="248" y="556" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="24" font-weight="800" fill="#1A5C3A">更可持续的生活方式。</text><rect x="664" y="408" width="360" height="140" rx="24" fill="#F8FBF1" stroke="#D6E6D8"/><text x="696" y="450" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="18" font-weight="600" fill="#4F6356">从今天做起</text><text x="696" y="488" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="23" font-weight="700" fill="#1A5C3A">节约一度电</text><text x="696" y="520" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="23" font-weight="700" fill="#1A5C3A">少开一次车</text><text x="696" y="552" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="23" font-weight="700" fill="#1A5C3A">少浪费一份食物</text><path d="M1038 428 C1092 454 1126 500 1140 548" fill="none" stroke="#D6E6D8" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/><circle cx="1088" cy="512" r="42" fill="#F0F7F0"/><use data-icon="tabler-outline/recycle" x="1066" y="490" width="44" height="44" fill="#27AE60" stroke-width="2"/><text x="216" y="600" font-family="'Microsoft YaHei','Calibri',sans-serif" font-size="18" font-weight="700" fill="#27AE60">谢谢聆听 · 低碳生活，从我做起</text></svg>